<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luca Portfolio Viewer — Book Flip</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--
        Dependencies:
          • jQuery 3.7.1
          • turn.js v3  — the standard library for Issuu-style page curls
            If the cdnjs link below fails, download turn.min.js from
            https://github.com/blasten/turn.js and place it next to this file,
            then replace the src with: <script src="turn.min.js">
    -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: #1c1c1c;
            font-family: system-ui, -apple-system, sans-serif;
            color: #f0f0f0;
            overflow: hidden;
        }

        body { display: flex; align-items: center; justify-content: center; }

        /* ── Outer shell ───────────────────────────────────────────── */
        #viewer-wrapper {
            width: 100%; height: 100vh;
            max-width: 1800px; max-height: 1100px;
            background: #2c2c2c;
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        /* ── Book stage ────────────────────────────────────────────── */
        #book-stage {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 60px; /* horizontal room for nav arrows */
            overflow: hidden;
            position: relative;
        }

        /* turn.js book wrapper — lets us zoom without breaking turn.js */
        #book-scaler {
            transform-origin: center center;
            transition: transform 0.2s ease;
        }

        /*
         * The book element itself.
         * BLACK background is the key: in double mode turn.js shows an empty
         * left panel on the first spread — the black background fills it,
         * making the cover appear to the right of a dark void.
         */
        #book {
            background: #2c2c2c !important;
        }

        /* ── Page types ────────────────────────────────────────────── */
        .page {
            overflow: hidden;
            position: relative;
        }

        /*
         * Cover page (source 1) — portrait 1700×2200.
         * In double mode, turn.js places page 1 alone on the RIGHT side.
         * The half-page slot is 1275×1650 (landscape-height × half-landscape-width).
         * Cover ratio  1700/2200 = 0.7727
         * Slot ratio   1275/1650 = 0.7727  → covers the slot with zero letterboxing.
         */
        .page-cover {
            background-color: #fff;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /*
         * Landscape pages (sources 2–89) — each 2550×1650.
         * We split each image across TWO turn.js pages using the
         * background-size: 200% 100% trick:
         *   • The image is rendered at 2× the container width (= full 2550px).
         *   • Left half:  background-position 0% 50%  → left 1275px visible.
         *   • Right half: background-position 100% 50% → right 1275px visible.
         */
        .page-land-left {
            background-color: #fff;
            background-size: 200% 100%;
            background-position: 0% 50%;
            background-repeat: no-repeat;
        }

        .page-land-right {
            background-color: #fff;
            background-size: 200% 100%;
            background-position: 100% 50%;
            background-repeat: no-repeat;
        }

        /* Placeholder spinner while an image loads */
        .page-loading {
            position: absolute;
            inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #f4f4f4;
            z-index: 1;
        }

        .page-loading::after {
            content: '';
            width: 28px; height: 28px;
            border: 3px solid #ddd;
            border-top-color: #888;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Loading overlay (initial) ─────────────────────────────── */
        #loading-overlay {
            position: absolute; inset: 0; z-index: 5000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            background: rgba(28, 28, 28, 0.92);
            transition: opacity 0.4s ease;
        }

        #loading-overlay.hidden { opacity: 0; pointer-events: none; }

        #loading-overlay .big-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #eee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #loading-overlay p { font-size: 13px; color: #999; }

        /* ── Nav arrows ────────────────────────────────────────────── */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-60%);
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: rgba(0,0,0,0.55); color: #fff;
            font-size: 22px; line-height: 1;
            cursor: pointer; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, opacity 0.3s;
        }

        .nav-btn:hover  { background: rgba(0,0,0,0.8); }
        .nav-btn:disabled { opacity: 0.2; cursor: default; }

        #prev-btn { left: 12px; }
        #next-btn { right: 12px; }

        /* ── Fullscreen ────────────────────────────────────────────── */
        #fullscreen-btn {
            position: absolute; top: 10px; right: 10px; z-index: 300;
            border: none; padding: 5px 12px; border-radius: 4px;
            background: rgba(0,0,0,0.6); color: #eee;
            font-size: 12px; cursor: pointer; letter-spacing: 0.03em;
        }

        #fullscreen-btn:hover { background: rgba(0,0,0,0.85); }

        /* ── Bottom control bar ────────────────────────────────────── */
        #bottom-controls {
            width: calc(100% - 100px); max-width: 680px;
            margin-bottom: 16px; flex-shrink: 0;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 14px; border-radius: 6px;
            z-index: 200;
        }

        #page-input {
            width: 38px; height: 22px; padding: 0 4px;
            border: none; border-radius: 3px;
            background: rgba(255,255,255,0.1); color: #eee;
            font-size: 12px; text-align: center; flex-shrink: 0;
        }

        #page-counter {
            font-size: 12px; color: #bbb;
            white-space: nowrap; flex-shrink: 0; min-width: 50px;
        }

        #page-slider {
            flex: 1; min-width: 0;
            -webkit-appearance: none; appearance: none;
            height: 4px; background: #555; border-radius: 2px; cursor: pointer;
        }

        #page-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px; border-radius: 50%; background: #eee;
        }

        #zoom-controls {
            display: flex; align-items: center; gap: 5px; flex-shrink: 0;
        }

        #zoom-controls button {
            background: none; border: none; color: #eee;
            font-size: 17px; cursor: pointer; padding: 0 2px;
            line-height: 1;
        }

        #zoom-label { font-size: 11px; color: #999; min-width: 32px; text-align: center; }

        /* ── Controls auto-hide in fullscreen ──────────────────────── */
        .hide-in-fs { transition: opacity 0.3s ease; }

        .hide-in-fs.hidden-now {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

<div id="viewer-wrapper">

    <!-- Initial loading screen -->
    <div id="loading-overlay">
        <div class="big-spinner"></div>
        <p>Discovering pages…</p>
    </div>

    <button id="fullscreen-btn" class="hide-in-fs">Full screen</button>

    <!-- Left / right page-turn arrows -->
    <button id="prev-btn" class="nav-btn hide-in-fs" disabled>&#8249;</button>
    <button id="next-btn" class="nav-btn hide-in-fs" disabled>&#8250;</button>

    <!-- Book lives here -->
    <div id="book-stage">
        <div id="book-scaler">
            <div id="book"></div>
        </div>
    </div>

    <!-- Bottom bar: page input + slider + zoom -->
    <div id="bottom-controls" class="hide-in-fs">
        <input type="text" id="page-input" value="1" title="Go to page">
        <span id="page-counter">/ —</span>
        <input type="range" id="page-slider" min="1" max="1" value="1">
        <div id="zoom-controls">
            <button id="zoom-out-btn" title="Zoom out">－</button>
            <span id="zoom-label">100%</span>
            <button id="zoom-in-btn"  title="Zoom in">＋</button>
        </div>
    </div>
</div>

<script>
/* ─── Config ──────────────────────────────────────────────────────────────── */
const IMAGE_FOLDER    = 'pages';
const IMAGE_BASE_NAME = '2501202-GiaramidaroLuca-Portfolio_Page_';
const IMAGE_EXT       = 'jpg';
const IMAGE_DIGITS    = 2;
const MAX_IMAGES      = 200;
const FLIP_DURATION   = 2000; // ms — slow, clearly visible page curl

/*
 * Actual source image dimensions:
 *   Cover (source 1) : 1700 × 2200 — portrait  ratio 0.7727
 *   Inner (sources 2–89): 2550 × 1650 — landscape
 *
 * In double mode each turn.js "page" is half the book width:
 *   Book total : 2550 × 1650  (ratio ≈ 1.545)
 *   Each half  : 1275 × 1650  (ratio 0.7727 — same as cover!)
 *
 * So the cover fills its half-slot perfectly with no letterboxing.
 * Landscape images are split left/right using background-size: 200% 100%.
 */
const LANDSCAPE_W = 2550;
const LANDSCAPE_H = 1650;

/* ─── State ───────────────────────────────────────────────────────────────── */
let SOURCE_TOTAL   = 0;   // number of source image files discovered
let TOTAL_TURN_PGS = 0;   // total turn.js pages (1 cover + (n-1)*2 landscape halves)

let currentSourcePage = 1;
let isFullscreen      = false;
let fsHideTimer       = null;

/*
 * turnPageEls[tp - 1] = DOM element for turn.js page tp.
 * Captured before turn.js init so we can reference them reliably after
 * turn.js reorganises the DOM.
 */
const turnPageEls   = [];
const loadedTurnSet = new Set();   // turn page numbers whose image is fully loaded

let zoomLevel   = 1.0;
const ZOOM_MIN  = 0.5;
const ZOOM_MAX  = 3.0;
const ZOOM_STEP = 0.2;

/* ─── Utilities ───────────────────────────────────────────────────────────── */
function padded(n) {
    return String(n).padStart(IMAGE_DIGITS, '0');
}

function imageSrc(n) {
    return `${IMAGE_FOLDER}/${IMAGE_BASE_NAME}${padded(n)}.${IMAGE_EXT}`;
}

function checkImage(src) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload  = () => resolve(src);
        img.onerror = () => reject();
        img.src = src;
    });
}

/* ─── Page-number conversion ──────────────────────────────────────────────── */
/*
 * Turn pages are numbered 1…TOTAL_TURN_PGS:
 *
 *   Turn 1          → source 1 (cover, sits alone on the RIGHT of spread 1)
 *   Turn 2, 3       → source 2 (left half / right half of landscape image 2)
 *   Turn 4, 5       → source 3
 *   Turn 2k, 2k+1   → source k+1
 *
 * Conversion:
 *   turnToSource(tp) = tp===1 ? 1 : floor(tp/2) + 1
 *   sourceToTurn(n)  = n===1  ? 1 : 2*(n-1)
 */
function turnToSource(tp) {
    return tp === 1 ? 1 : Math.floor(tp / 2) + 1;
}

function sourceToTurn(n) {
    return n === 1 ? 1 : 2 * (n - 1);
}

/* ─── Parallel image discovery ────────────────────────────────────────────── */
async function discoverImages() {
    const checks = Array.from({ length: MAX_IMAGES }, (_, i) => {
        const src = imageSrc(i + 1);
        return checkImage(src)
            .then(() => i + 1)
            .catch(() => null);
    });
    const results = await Promise.all(checks);
    const found = [];
    for (const n of results) {
        if (n === null) break;   // stop at first gap
        found.push(n);
    }
    return found;
}

/* ─── Book sizing ─────────────────────────────────────────────────────────── */
function getBookDimensions() {
    const stage  = document.getElementById('book-stage');
    const rect   = stage.getBoundingClientRect();
    const availW = rect.width;
    const availH = rect.height;

    // Book is sized as a full landscape spread (width = 2550, height = 1650)
    const ratio = LANDSCAPE_W / LANDSCAPE_H; // ≈ 1.545

    let w = availW;
    let h = Math.round(w / ratio);
    if (h > availH) { h = availH; w = Math.round(h * ratio); }

    return { w: Math.max(w, 80), h: Math.max(h, 80) };
}

/* ─── Lazy image loading ──────────────────────────────────────────────────── */
function loadTurnPage(tp) {
    if (tp < 1 || tp > TOTAL_TURN_PGS) return;
    if (loadedTurnSet.has(tp)) return;

    const el = turnPageEls[tp - 1];
    if (!el) return;

    const placeholder = el.querySelector('.page-loading');
    if (!placeholder)                return;   // already loaded
    if (placeholder.dataset.loading) return;   // request in-flight

    placeholder.dataset.loading = '1';

    const srcN = parseInt(el.dataset.sourceN, 10);
    const src  = imageSrc(srcN);

    const img = new Image();
    img.onload = function () {
        el.style.backgroundImage = `url("${src}")`;
        if (placeholder.parentNode === el) placeholder.remove();
        loadedTurnSet.add(tp);
    };
    img.onerror = function () {
        placeholder.textContent     = '—';
        placeholder.style.fontSize  = '20px';
        placeholder.style.color     = '#bbb';
        placeholder.dataset.loading = '';   // allow retry
    };
    img.src = src;
}

/*
 * Load all turn pages belonging to a given source page number.
 * Cover  (n=1) → 1 turn page.
 * Others (n≥2) → 2 turn pages (left half + right half).
 */
function loadSourcePage(n) {
    if (n < 1 || n > SOURCE_TOTAL) return;
    if (n === 1) {
        loadTurnPage(1);
    } else {
        const tp = sourceToTurn(n);
        loadTurnPage(tp);
        loadTurnPage(tp + 1);
    }
}

function preloadAroundSource(n, radius) {
    for (let i = n - radius; i <= n + radius; i++) loadSourcePage(i);
}

/* ─── UI sync ─────────────────────────────────────────────────────────────── */
function syncUI(turnPage) {
    const sourceN = turnToSource(turnPage);
    currentSourcePage = sourceN;
    document.getElementById('page-input').value  = sourceN;
    document.getElementById('page-slider').value = sourceN;
    document.getElementById('prev-btn').disabled = sourceN <= 1;
    document.getElementById('next-btn').disabled = sourceN >= SOURCE_TOTAL;
}

/* ─── Zoom ────────────────────────────────────────────────────────────────── */
function applyZoom() {
    document.getElementById('book-scaler').style.transform =
        `scale(${zoomLevel})`;
    document.getElementById('zoom-label').textContent =
        Math.round(zoomLevel * 100) + '%';
}

function setZoom(z) {
    zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
    applyZoom();
}

/* ─── Navigation ──────────────────────────────────────────────────────────── */
function goToSource(n) {
    n = Math.max(1, Math.min(SOURCE_TOTAL, n));
    $('#book').turn('page', sourceToTurn(n));
}

function goNext() { goToSource(currentSourcePage + 1); }
function goPrev() { goToSource(currentSourcePage - 1); }

/* ─── Fullscreen auto-hide ────────────────────────────────────────────────── */
function setupFullscreenHide() {
    const wrapper = document.getElementById('viewer-wrapper');
    const hideEls = () => document.querySelectorAll('.hide-in-fs');

    const scheduleHide = () => {
        clearTimeout(fsHideTimer);
        fsHideTimer = setTimeout(() => {
            if (!isFullscreen) return;
            hideEls().forEach(el => el.classList.add('hidden-now'));
        }, 3000);
    };

    wrapper.addEventListener('mousemove', () => {
        if (!isFullscreen) return;
        hideEls().forEach(el => el.classList.remove('hidden-now'));
        scheduleHide();
    });

    document.addEventListener('fullscreenchange', () => {
        isFullscreen = !!document.fullscreenElement;
        const btn = document.getElementById('fullscreen-btn');
        if (!isFullscreen) {
            clearTimeout(fsHideTimer);
            hideEls().forEach(el => el.classList.remove('hidden-now'));
            btn.textContent = 'Full screen';
        } else {
            btn.textContent = 'Exit full screen';
            scheduleHide();
        }
    });
}

/* ─── Main init ───────────────────────────────────────────────────────────── */
$(document).ready(async function () {

    /* 1. Discover pages */
    const pages  = await discoverImages();
    SOURCE_TOTAL = pages.length;

    if (SOURCE_TOTAL === 0) {
        document.getElementById('loading-overlay').innerHTML =
            '<p style="color:#e55">No images found in the pages/ folder.</p>';
        return;
    }

    /*
     * Total turn.js pages:
     *   1 (cover) + (SOURCE_TOTAL − 1) landscape images × 2 half-pages each
     */
    TOTAL_TURN_PGS = 1 + (SOURCE_TOTAL - 1) * 2;

    /* 2. Calculate book dimensions */
    const { w, h } = getBookDimensions();

    /* 3. Build turn.js page elements ─────────────────────────────────────── */

    /* Turn page 1 — cover (portrait, appears on right of first spread) */
    const coverDiv = document.createElement('div');
    coverDiv.className      = 'page page-cover';
    coverDiv.dataset.sourceN = '1';
    const coverSpinner = document.createElement('div');
    coverSpinner.className  = 'page-loading';
    coverDiv.appendChild(coverSpinner);
    document.getElementById('book').appendChild(coverDiv);
    turnPageEls.push(coverDiv);  // index 0 → turn page 1

    /* Turn pages 2…TOTAL_TURN_PGS — left/right halves of landscape images */
    for (let n = 2; n <= SOURCE_TOTAL; n++) {
        // Left half
        const leftDiv = document.createElement('div');
        leftDiv.className       = 'page page-land-left';
        leftDiv.dataset.sourceN = String(n);
        const leftSpinner = document.createElement('div');
        leftSpinner.className   = 'page-loading';
        leftDiv.appendChild(leftSpinner);
        document.getElementById('book').appendChild(leftDiv);
        turnPageEls.push(leftDiv);

        // Right half
        const rightDiv = document.createElement('div');
        rightDiv.className       = 'page page-land-right';
        rightDiv.dataset.sourceN = String(n);
        const rightSpinner = document.createElement('div');
        rightSpinner.className   = 'page-loading';
        rightDiv.appendChild(rightSpinner);
        document.getElementById('book').appendChild(rightDiv);
        turnPageEls.push(rightDiv);
    }

    /* 4. Initialise turn.js ──────────────────────────────────────────────── */
    $('#book').turn({
        width:        w,
        height:       h,
        autoCenter:   true,
        display:      'double',      // two-page spread
        acceleration: true,
        gradients:    true,          // realistic fold shadow & highlight
        duration:     FLIP_DURATION, // slow, visible page curl
        page:         1,
        when: {
            turning: function (e, page) {
                const src = turnToSource(page);
                preloadAroundSource(src, 3);
                syncUI(page);
            },
            turned: function (e, page) {
                syncUI(page);
            }
        }
    });

    /* 5. Preload initial pages */
    preloadAroundSource(1, 4);

    /* 6. Update slider range and counter */
    document.getElementById('page-slider').max           = SOURCE_TOTAL;
    document.getElementById('page-counter').textContent  = `/ ${SOURCE_TOTAL}`;
    syncUI(1);

    /* 7. Hide loading overlay */
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 450);

    /* ── Event listeners ────────────────────────────────────────────────── */

    // Nav arrows
    document.getElementById('prev-btn').addEventListener('click', goPrev);
    document.getElementById('next-btn').addEventListener('click', goNext);

    // Slider — jumps directly to a source page (no chained flips)
    document.getElementById('page-slider').addEventListener('input', function () {
        goToSource(parseInt(this.value, 10));
    });

    // Page number input
    document.getElementById('page-input').addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        let p = parseInt(this.value, 10);
        if (isNaN(p)) { this.value = currentSourcePage; return; }
        goToSource(p);
    });
    document.getElementById('page-input').addEventListener('blur', function () {
        this.value = currentSourcePage;
    });

    // Zoom buttons
    document.getElementById('zoom-in-btn').addEventListener('click',
        () => setZoom(zoomLevel + ZOOM_STEP));
    document.getElementById('zoom-out-btn').addEventListener('click',
        () => setZoom(zoomLevel - ZOOM_STEP));

    // Mouse-wheel zoom (Ctrl/Cmd + scroll)
    document.getElementById('book-stage').addEventListener('wheel', function (e) {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            setZoom(zoomLevel + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
        }
    }, { passive: false });

    // Keyboard shortcuts
    document.addEventListener('keydown', function (e) {
        if (e.defaultPrevented) return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goNext(); }
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goPrev(); }
        if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '=')) {
            e.preventDefault(); setZoom(zoomLevel + ZOOM_STEP);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === '-') {
            e.preventDefault(); setZoom(zoomLevel - ZOOM_STEP);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === '0') {
            e.preventDefault(); setZoom(1.0);
        }
    });

    // Fullscreen button
    document.getElementById('fullscreen-btn').addEventListener('click', function () {
        const wrapper = document.getElementById('viewer-wrapper');
        if (!document.fullscreenElement) wrapper.requestFullscreen();
        else document.exitFullscreen();
    });

    // Auto-hide controls in fullscreen
    setupFullscreenHide();

    // Responsive resize: recalculate book size when viewport changes
    const resizeObserver = new ResizeObserver(() => {
        if (!$('#book').data('turn')) return;
        const { w: nw, h: nh } = getBookDimensions();
        $('#book').turn('size', nw, nh);
    });
    resizeObserver.observe(document.getElementById('book-stage'));
});
</script>
</body>
</html>
